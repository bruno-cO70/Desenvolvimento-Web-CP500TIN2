<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Meus Pedidos - BevShop</title>
    
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="BD.js"></script>
    <script src="script.js"></script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
    <div class="relative flex h-auto min-h-screen w-full flex-col group/design-root">
        
        <header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 lg:px-10 py-3 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md sticky top-0 z-50">
            <div class="flex items-center gap-6 lg:gap-8 flex-1">
                <div class="flex items-center gap-3 text-primary">
                    <div class="size-6 flex items-center justify-center">
                        <span class="material-symbols-outlined text-[28px]">local_bar</span>
                    </div>
                    <h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">BevShop</h2>
                </div>
                <form id="search-form" class="hidden sm:flex flex-col h-10 w-full max-w-sm">
                    <div class="flex w-full flex-1 items-stretch rounded-full h-full bg-slate-100 dark:bg-slate-800">
                        <div class="text-slate-500 dark:text-slate-400 flex items-center justify-center pl-4 pr-2">
                            <span class="material-symbols-outlined text-[20px]">search</span>
                        </div>
                        <input id="search-input" type="search" autocomplete="off" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-r-full focus:outline-0 focus:ring-0 border-none bg-transparent h-full placeholder:text-slate-500 dark:placeholder:text-slate-400 px-2 text-sm font-medium" placeholder="Buscar bebidas..." />
                    </div>
                </form>
            </div>

            <div class="flex items-center justify-end gap-6 lg:gap-8">
                <nav class="hidden md:flex items-center gap-8">
                    <a class="text-slate-600 hover:text-primary dark:text-slate-300 transition-colors text-sm font-medium" href="index.html">Início</a>
                    <a class="text-slate-600 hover:text-primary dark:text-slate-300 transition-colors text-sm font-medium" href="produtos.html">Produtos</a>
                    <a class="text-slate-600 hover:text-primary dark:text-slate-300 transition-colors text-sm font-medium" href="pagamento.html">Pagamento</a>
                </nav>
                <div class="flex items-center gap-3">
                    <button onclick="abrirCarrinhoLateral()" class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors relative">
                        <span class="material-symbols-outlined text-[22px]">shopping_cart</span>
                        <span class="cart-counter absolute top-0 right-0 flex h-4 w-4 items-center justify-center rounded-full bg-primary text-white text-[10px] font-bold hidden">0</span>
                    </button>
                    <div class="relative">
                        <button id="btn-user-menu" onclick="toggleUserMenu()" class="flex size-10 cursor-pointer items-center justify-center rounded-full bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 transition-colors">
                            <span id="user-icon-display" class="material-symbols-outlined text-[22px]">person</span>
                        </button>
                        
                        <div id="user-dropdown" class="absolute right-0 mt-3 w-64 bg-white dark:bg-slate-800 rounded-xl shadow-[0_10px_40px_rgba(0,0,0,0.2)] border border-slate-200 dark:border-slate-700 hidden flex-col z-[100] overflow-hidden origin-top-right transition-all">
                            <div class="p-5 border-b border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50">
                                <p id="user-name-display" class="font-bold text-slate-900 dark:text-white text-base">Visitante</p>
                                <p id="user-email-display" class="text-slate-500 dark:text-slate-400 text-sm mt-1 truncate">Faça login para ver seus dados</p>
                            </div>
                            <div class="p-2">
                                <a href="pedidos.html" class="flex items-center gap-3 px-4 py-3 text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700/50 rounded-lg transition-colors">
                                    <span class="material-symbols-outlined text-[20px] text-primary dark:text-primary-gold">receipt_long</span> Meus Pedidos
                                </a>
                                <button onclick="logoutUser()" class="w-full flex items-center gap-3 px-4 py-3 text-sm font-medium text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-500/10 rounded-lg transition-colors text-left">
                                    <span class="material-symbols-outlined text-[20px]">logout</span> Sair da Conta
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 w-full max-w-[800px] mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">
            <div class="flex items-center gap-3 mb-8">
                <span class="material-symbols-outlined text-primary text-3xl">receipt_long</span>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight">Meus Pedidos</h1>
            </div>
            
            <div id="lista-pedidos" class="flex flex-col gap-6">
                </div>
        </main>
        
        <footer class="border-t border-slate-200 dark:border-slate-800 py-8 mt-auto text-center text-slate-500 text-sm bg-white dark:bg-slate-900">
            <p>Site desenvolvido por Bruno Carvalho em 2026.</p>
        </footer>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] hidden opacity-0 transition-opacity duration-300" onclick="fecharCarrinhoLateral()"></div>
    
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white dark:bg-slate-900 shadow-2xl z-[70] transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="flex items-center justify-between p-6 border-b border-slate-200 dark:border-slate-800">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">shopping_bag</span>
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Seu Carrinho</h2>
            </div>
            <button onclick="fecharCarrinhoLateral()" class="text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors">
                <span class="material-symbols-outlined text-2xl">close</span>
            </button>
        </div>
        <div id="cart-sidebar-items" class="flex-1 overflow-y-auto p-6 flex flex-col gap-5 scrollbar-thin"></div>
        <div class="p-6 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-600 dark:text-slate-400 font-medium">Subtotal</span>
                <span id="cart-sidebar-subtotal" class="text-xl font-bold text-slate-900 dark:text-white">R$ 0,00</span>
            </div>
            <a href="pagamento.html" class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white rounded-lg h-12 font-bold transition-colors shadow-md">
                Ir para o Pagamento <span class="material-symbols-outlined text-lg">arrow_forward</span>
            </a>
        </div>
    </div>
</body>
</html>
